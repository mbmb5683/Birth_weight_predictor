<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict Birth Weight</title>
    <style>
        body {
            background-color: #ffe6f0; /* Light baby pink */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            flex-direction: column;
        }

        h1 {
            color: #d63384;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.2em;
        }

        form {
            background-color: white;
            padding: 25px 30px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        label {
            display: block;
            margin: 10px 0 5px;
            font-weight: bold;
            color: #333;
        }

        input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #ff99cc;
            border: none;
            color: white;
            font-size: 1em;
            border-radius: 10px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ff66b2;
        }

        h3 {
            margin-top: 15px;
            color: #d63384;
            text-align: center;
        }

        .emoji-heading {
            font-size: 1.5em;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="emoji-heading">👶🍼 Welcome! Let's Predict Your Baby's Weight 🍼👶</div>
    <h1>Mohit's Project</h1>
    <h1>Predict Birth Weight</h1>

    <form method="POST" action="/predict">
        <label>Gestation</label>
        <input name="gestation" type="number" required>

        <label>Parity</label>
        <input name="parity" type="number" required>

        <label>Age</label>
        <input name="age" type="number" required>

        <label>Height</label>
        <input name="height" type="number" required>

        <label>Weight</label>
        <input name="weight" type="number" required>

        <label>Smoke</label>
        <input name="smoke" type="number" required>

        <button type="submit">🔍 Predict Baby's Weight</button>

        <h3>🎯 Predicted Birth Weight: = {{ prediction }}   🎯</h3>
    </form>

</body>
</html>
