<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Predict Birth Weight</title>
  <style>
    body {
      background: url('https://www.transparenttextures.com/patterns/flowers.png'),
                  linear-gradient(to bottom, #ffe6f0, #fff0f5);
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      flex-direction: column;
      background-size: 200px; /* Controls flower pattern size */
    }

    h1 {
      color: #d63384;
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.2em;
    }

    form {
      background-color: white;
      padding: 25px 30px;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 1;
    }

    label {
      display: block;
      margin: 10px 0 5px;
      font-weight: bold;
      color: #333;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: #ff99cc;
      border: none;
      color: white;
      font-size: 1em;
      border-radius: 10px;
      cursor: pointer;
    }

    button:hover {
      background-color: #ff66b2;
    }

    h3 {
      margin-top: 15px;
      color: #d63384;
      text-align: center;
    }

    .emoji-heading {
      font-size: 1.5em;
      margin-bottom: 5px;
    }

    /* Confetti Canvas */
    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div class="emoji-heading">👶🍼 Welcome! Let's Predict Your Baby's Weight 🍼👶</div>
  <h1>Mohit's Project</h1>
  <h1>Predict Birth Weight</h1>

  <form method="POST" action="/predict">
    <label>Gestation (born in days)</label>
    <input name="gestation" type="number" required>

    <label>Parity (0=first pregnancy , 1= >1)</label>
    <input name="parity" type="number" required>

    <label>Age</label>
    <input name="age" type="number" required>

    <label>Height</label>
    <input name="height" type="number" required>

    <label>Weight</label>
    <input name="weight" type="number" required>

    <label>Smoke(0=non-smoker, 1= smoker)</label>
    <input name="smoke" type="number" required>

    <button type="submit">🔍 Predict Baby's Weight</button>

    <h3 id="result">🎯 Predicted Birth Weight: = {{ prediction }} 🎯</h3>
  </form>

  <!-- Canvas for Confetti -->
  <canvas id="confetti-canvas"></canvas>

  <!-- Confetti Script -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    window.onload = function() {
      // Check if prediction is available
      const resultText = document.getElementById("result").innerText;
      if (resultText.includes("{{ prediction }}") === false && resultText.trim() !== "") {
        // Fire confetti 🎉
        var duration = 3 * 1000;
        var end = Date.now() + duration;

        (function frame() {
          confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
          });
          confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
          });

          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        }());
      }
    }
  </script>

</body>
</html>
